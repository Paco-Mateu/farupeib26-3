name: Guardrails

on:
  pull_request:
  push:
    branches:
      - "**"

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run secret audit
        run: python3 scripts/secret-audit.py

      - name: Compile backend
        run: python3 -m py_compile api/index.py $(find backend -name '*.py' -print)

      - name: Build frontend
        run: npm run build
